# Server Config
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-binding-errors=always

# Database Configuration (Render Internal URL)
# IMPORTANT: SPRING_DATASOURCE_URL must start with jdbc:postgresql://
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skillsync_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Resilience Settings
spring.jpa.database=POSTGRESQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL:update}
spring.jpa.show-sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET:SkillSyncSuperSecretKey2024XYZDefaultPlaceholderForLocalDev}
jwt.expiration=86400000

# AI Microservice URL
python.backend.url=${PYTHON_BACKEND_URL:http://localhost:8000}

# Logging
logging.level.com.skillsync=INFO
logging.level.org.springframework.security=INFO
