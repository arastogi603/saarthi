# ===============================
# Server Config
# ===============================
server.port=${PORT:8080}
# Force binding to all network interfaces (Fixes Render port scanning issues)
server.address=0.0.0.0

server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-binding-errors=always

# ===============================
# Database Configuration
# ===============================
# IMPORTANT: SPRING_DATASOURCE_URL must start with jdbc:postgresql://
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skillsync_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate Settings
# ===============================
# LOCK: We specify the dialect explicitly to ensure Render NEVER crashes during startup.
spring.jpa.database=POSTGRESQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL:update}
spring.jpa.show-sql=false

# ===============================
# Database Connection Pool
# ===============================
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-timeout=30000

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:SkillSyncSuperSecretKey2024XYZDefaultPlaceholderForLocalDev}
jwt.expiration=86400000

# ===============================
# AI Microservice URL
# ===============================
python.backend.url=${PYTHON_BACKEND_URL:https://abhishek18-dev-saarthi.hf.space}

# ===============================
# Logging
# ===============================
logging.level.com.skillsync=INFO
logging.level.org.springframework.security=INFO
# This line hides the HHH90000025 warning you were seeing:
logging.level.org.hibernate.orm.deprecation=ERROR
